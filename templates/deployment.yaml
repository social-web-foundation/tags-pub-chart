apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tags-pub.fullname" . }}
  labels:
    {{- include "tags-pub.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tags-pub.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tags-pub.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "tags-pub.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: tags-pub
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.env.PORT | default "9000" | int }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ required "values.env.DATABASE_URL is required" .Values.env.DATABASE_URL | quote }}
            - name: ORIGIN
              value: {{ required "values.env.ORIGIN is required" .Values.env.ORIGIN | quote }}
            - name: PORT
              value: {{ .Values.env.PORT | default "9000" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | default "info" | quote }}
            - name: TRUST_PROXY
              value: {{ .Values.env.TRUST_PROXY | default 1 | quote }}
            {{- with .Values.env.REDIS_URL }}
            - name: REDIS_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- toYaml (omit .Values.startupProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- toYaml (omit .Values.livenessProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- toYaml (omit .Values.readinessProbe "enabled") | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
