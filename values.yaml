replicaCount: 1

image:
  repository: ghcr.io/social-web-foundation/tags.pub
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tags-pub.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  DATABASE_URL: ""
  ORIGIN: ""
  PORT: "9000"
  LOG_LEVEL: "info"

extraEnv: []

livenessProbe:
  enabled: true
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  enabled: true
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
