replicaCount: 1

image:
  repository: ghcr.io/social-web-foundation/tags.pub
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tags-pub.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  DATABASE_URL: ""
  ORIGIN: ""
  PORT: "9000"
  LOG_LEVEL: "info"

extraEnv: []

startupProbe:
  enabled: true
  httpGet:
    path: /livez
    port: http
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  enabled: true
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

resources:
  requests:
    cpu: 100m
    memory: 768Mi
  limits:
    memory: 1Gi

nodeSelector: {}
tolerations: []
affinity: {}
